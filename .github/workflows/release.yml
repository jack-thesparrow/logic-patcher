name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for PyPI trusted publishing

jobs:
  # ── 1. Tests must pass first ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: python -m unittest discover -s tests -v

  # ── 2. Build artifacts (only if tests pass) ───────────────────────────────────
  build-sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get install -y dpkg python3-tk
      - run: bash scripts/build_deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/deb/*.deb

  build-exe:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bash scripts/build_exe.sh
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  # ── 3. Publish to PyPI and create GitHub Release (only when ALL builds pass) ──
  publish-pypi:
    needs: build-sdist
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [publish-pypi, build-deb, build-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
